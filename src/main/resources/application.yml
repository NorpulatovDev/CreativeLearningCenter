spring:
  application:
    name: lms-backend
  
  datasource:
    url: jdbc:h2:mem:lmsdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: your_super_secret_key_change_this_in_production_at_least_32_characters_long
  expiration: 86400000

telegram:
  bot:
    token: 8058975339:AAEXtDX5iTQbc5-8CziiOL2Hu1fILxHaFLw  # Replace with your token
    username: Creative_learning_service_bot  # Replace with your bot username

app:
  base-url: http://localhost:8080

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param