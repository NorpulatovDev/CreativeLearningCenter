spring:
  application:
    name: lms-backend
  
  datasource:
    url: jdbc:h2:mem:lmsdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: your_super_secret_key_change_this_in_production_at_least_32_characters_long
  expiration: 86400000  # 24 hours in milliseconds

telegram:
  api-token: TelegramApiKey
  api-url: https://api.telegram.org

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: on_param