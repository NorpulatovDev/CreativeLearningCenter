# Server Configuration
server.port=8080

# ==================== DATABASE CONFIGURATION ====================

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:lmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# PostgreSQL Database (Production) - Uncomment for production
# spring.datasource.url=jdbc:postgresql://localhost:5432/lmsdb
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your_password

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==================== JWT CONFIGURATION ====================
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong123456789
jwt.expiration=86400000

# ==================== ADMIN CREDENTIALS ====================
admin.username=admin
admin.password=admin123

